version: '3'

vars:
  ENV_LOCAL: '{{default "env/local/.env.local" .ENV_LOCAL}}'

tasks:
  doctor:
    desc: Validate local Mattermost bot prerequisites
    cmds:
      - ./scripts/local/doctor.sh {{.ENV_LOCAL}}

  local-up:
    desc: Start Mattermost, seed local test data, and start the bot with Postgres
    env:
      SEED_MATTERMOST_DATA: '{{default "true" .SEED_MATTERMOST_DATA}}'
    cmds:
      - ./scripts/local/up.sh {{.ENV_LOCAL}}

  local-seed:
    desc: Idempotently seed the local Mattermost user, team, channel, bot, and bot token
    cmds:
      - ./scripts/local/seed.sh {{.ENV_LOCAL}}

  local-ps:
    desc: Show local Mattermost bot stack status
    cmds:
      - ./scripts/local/ps.sh {{.ENV_LOCAL}}

  local-logs:
    desc: Follow local Mattermost and bot logs
    cmds:
      - ./scripts/local/logs.sh {{.ENV_LOCAL}}

  local-smoke:
    desc: Verify Mattermost, seeded data, bot callbacks, and AcornOps readiness
    env:
      CHECK_ACORNOPS: '{{default "true" .CHECK_ACORNOPS}}'
      SEED_MATTERMOST_DATA: '{{default "true" .SEED_MATTERMOST_DATA}}'
    cmds:
      - ./scripts/local/smoke.sh {{.ENV_LOCAL}}

  local-down:
    desc: Stop the local Mattermost bot stack while preserving data
    cmds:
      - ./scripts/local/down.sh {{.ENV_LOCAL}}

  local-reset:
    desc: Reset the local Mattermost bot stack and wipe its data and generated token
    cmds:
      - ./scripts/local/reset.sh {{.ENV_LOCAL}}

  validate:
    desc: Run repository and local-stack static validation
    cmds:
      - ./init.sh
      - ./scripts/verify-local-stack.sh
      - ./scripts/verify-demo-stack.sh

  demo:doctor:
    desc: Validate standalone Mattermost demo prerequisites
    cmds:
      - ./scripts/demo/doctor.sh {{default "env/demo/.env.demo" .DEMO_ENV_FILE}}

  demo:deploy:
    desc: Build, deploy, seed, expose, and verify the standalone Mattermost demo
    cmds:
      - ./scripts/demo/deploy.sh {{default "env/demo/.env.demo" .DEMO_ENV_FILE}}

  demo:verify:
    desc: Verify the live standalone Mattermost demo
    cmds:
      - ./scripts/demo/verify.sh {{default "env/demo/.env.demo" .DEMO_ENV_FILE}}

  demo:status:
    desc: Show Mattermost demo containers and ingress state
    cmds:
      - ./scripts/demo/status.sh {{default "env/demo/.env.demo" .DEMO_ENV_FILE}}

  demo:logs:
    desc: Show recent Mattermost demo logs
    cmds:
      - ./scripts/demo/logs.sh {{default "env/demo/.env.demo" .DEMO_ENV_FILE}}

  demo:down:
    desc: Stop Mattermost demo containers while preserving data and ingress
    cmds:
      - ./scripts/demo/down.sh {{default "env/demo/.env.demo" .DEMO_ENV_FILE}}

  demo:backup:
    desc: Back up Mattermost databases and persistent files with a short application pause
    cmds:
      - ./scripts/demo/backup.sh {{default "env/demo/.env.demo" .DEMO_ENV_FILE}}

  demo:reset:
    desc: Delete Mattermost demo containers, volumes, ingress, and generated token
    cmds:
      - ./scripts/demo/reset.sh {{default "env/demo/.env.demo" .DEMO_ENV_FILE}} --confirm

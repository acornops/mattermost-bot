services:
  mattermost-bot:
    build:
      context: .
    image: acornops-mattermost-bot:local
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      MATTERMOST_URL: ${MATTERMOST_URL:-http://host.docker.internal:8065}
      MATTERMOST_BOT_TOKEN: ${MATTERMOST_BOT_TOKEN:-}
      MATTERMOST_BOT_USERNAME: ${MATTERMOST_BOT_USERNAME:-acorn-ops-bot}
      ACORNOPS_API_BASE_URL: ${ACORNOPS_API_BASE_URL:-http://host.docker.internal:8081}
      EXTERNAL_INTEGRATION_SERVICE_TOKEN: ${EXTERNAL_INTEGRATION_SERVICE_TOKEN:-}
      BOT_DATABASE_URL: ${BOT_DATABASE_URL:-}
      BOT_HTTP_HOST: ${BOT_HTTP_HOST:-0.0.0.0}
      BOT_HTTP_PORT: ${BOT_HTTP_PORT:-8080}
      BOT_PUBLIC_BASE_URL: ${BOT_PUBLIC_BASE_URL:-http://localhost:8080}
      MATTERMOST_ACTION_SECRET: ${MATTERMOST_ACTION_SECRET:-}
      ACORNOPS_WEBHOOK_SECRET: ${ACORNOPS_WEBHOOK_SECRET:-}
      CHAT_RUN_POLL_ATTEMPTS: ${CHAT_RUN_POLL_ATTEMPTS:-15}
      CHAT_RUN_POLL_INTERVAL_MS: ${CHAT_RUN_POLL_INTERVAL_MS:-1000}
      RUN_STREAM_RECONNECT_ATTEMPTS: ${RUN_STREAM_RECONNECT_ATTEMPTS:-3}
      RUN_STREAM_RECONNECT_DELAY_MS: ${RUN_STREAM_RECONNECT_DELAY_MS:-1000}
      RUN_STREAM_FALLBACK_POLL_INTERVAL_MS: ${RUN_STREAM_FALLBACK_POLL_INTERVAL_MS:-3000}
      RUN_STREAM_FALLBACK_POLL_MAX_MS: ${RUN_STREAM_FALLBACK_POLL_MAX_MS:-180000}
    ports:
      - "${BOT_HTTP_PORT:-8080}:${BOT_HTTP_PORT:-8080}"
